  <!-- Optimize font loading to prevent FCP render-blocking -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;500;600&display=swap">
  </noscript>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #F8F8F8;
      color: #1C1C1C;
    }

    html.dark body {
      background-color: #09090b; /* zinc-950 */
      color: #fafafa;
    }

    /* Minimalist scrollbar */
    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #EEEEEE;
    }

    html.dark ::-webkit-scrollbar-thumb {
      background: #3f3f46; /* zinc-700 */
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #E0E0E0;
    }

    html.dark ::-webkit-scrollbar-thumb:hover {
      background: #52525b; /* zinc-600 */
    }

    .body-viewer-container {
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#1C1C1C">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pocket Gull">

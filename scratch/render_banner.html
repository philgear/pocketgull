    .brand-name {
      font-size: 175px;
      font-weight: 900;
      line-height: 0.9;
      letter-spacing: -2px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ef6658 50%, #3ebc9e 50%);

      -webkit-text-fill-color: transparent;
      margin: 0;
      padding: 0;
    }
    .tagline {

      font-weight: 800;
      color: #ef6658;

      margin-top: 15px;

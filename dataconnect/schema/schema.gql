# schema.gql for Pocket-Gull Clinical Intelligence Layer

type Clinician @table(key: "uid") {
  uid: String! @default(expr: "auth.uid")
  email: String! @unique
  displayName: String
  role: String @default(value: "clinician")
}

type Patient @table {
  id: UUID! @default(expr: "uuidV4()")
  firstName: String!
  lastName: String!
  dateOfBirth: Date!
  gender: String
  vitalsHeartRate: Int
  vitalsSystolicBP: Int
  vitalsDiastolicBP: Int
  currentSymptoms: [String!]
  updatedAt: Timestamp! @default(expr: "request.time")
}

type CarePlan @table {
  id: UUID! @default(expr: "uuidV4()")
  patient: Patient!
  clinician: Clinician!
  diagnosis: String!
  recommendations: [String!]!
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

type ConsultationSession @table {
  id: UUID! @default(expr: "uuidV4()")
  patient: Patient!
  clinician: Clinician!
  transcript: String
  aiSummary: String
  createdAt: Timestamp! @default(expr: "request.time")
}

name: "Fuzz Testing"

on:
  push:
    branches: [ "main" ]
    paths:
      - 'pocketgull_api/**'
  schedule:
    # Run every Saturday at 4:00 AM UTC
    - cron: '0 4 * * 6'

permissions:
  contents: read

jobs:
  fuzz:
    name: Python Fuzz Tests (Atheris)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pocketgull_api/requirements.txt
          pip install atheris

      - name: Run Fuzz Targets
        run: |
          cd pocketgull_api
          python fuzz_targets.py
        env:
          # Atheris CI mode: run each target for a fixed number of iterations
          FUZZING_CI: "true"
        timeout-minutes: 10

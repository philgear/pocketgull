name: "OSSF Scorecard"

on:
  push:
    branches: [ "main" ]
  schedule:
    # Run every Monday at 6:00 AM UTC
    - cron: '0 6 * * 1'

# Required permissions for Scorecard
permissions:
  contents: read

jobs:
  scorecard:
    name: Scorecard Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # Upload SARIF to Security tab
      id-token: write         # Publish results to OpenSSF
      contents: read
      actions: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2.10.2
        with:
          egress-policy: audit

      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Run OSSF Scorecard
        uses: ossf/scorecard-action@62b2cac7ed8198b15735ed49ab1e5cf35480ba46 # v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          # Disable public REST publish if OIDC token is missing, keeping SARIF local upload robust
          publish_results: false

      - name: Upload Scorecard Results to Security Tab
        uses: github/codeql-action/upload-sarif@df409f7d9260372bd5f19e5b04e83cb3c43714ae # v3.27.9
        with:
          sarif_file: results.sarif

      - name: Upload SARIF Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

name: CI/CD Pipeline (HIPAA Compliant)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci --legacy-peer-deps
        
      - name: Security Audit
        run: npm audit --audit-level=high
        
      # Ensure code quality for clinical safety
      - name: Run Linters
        run: npm run lint --if-present

      # Run Red-Team Safety Checks
      - name: Run AI Safety Tests
        run: npx tsx tests/safety.spec.ts

  build-and-deploy:
    needs: security-and-lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: production # Enables manual approval gates in GitHub
    
    # Required permissions for Workload Identity Federation
    permissions:
      contents: 'read'
      id-token: 'write'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Google Auth
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          # Replaced credentials_json with Keyless Workload Identity
          workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'
          
      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'
        
      - name: Build and Push Docker Image
        run: |
          gcloud auth configure-docker us-west1-docker.pkg.dev
          IMAGE_PATH=us-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/pocketgull/web-ssr
          
          # Docker caching for faster builds
          docker pull $IMAGE_PATH:latest || true
          docker build \
            --cache-from $IMAGE_PATH:latest \
            -t $IMAGE_PATH:${{ github.sha }} \
            -t $IMAGE_PATH:latest .
            
          docker push $IMAGE_PATH:${{ github.sha }}
          docker push $IMAGE_PATH:latest
          
      - name: Deploy to Cloud Run
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: 'pocket-gull'
          region: 'us-west1'
          image: 'us-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/pocketgull/web-ssr:${{ github.sha }}'
          env_vars: |
            NODE_ENV=production
          # Secure deployment flags + GEMINI API Key binding
          flags: '--allow-unauthenticated --vpc-egress=private-ranges-only --set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest'

name: CI/CD Pipeline (HIPAA Compliant)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci --legacy-peer-deps
        
      - name: Security Audit
        run: npm audit --json > audit.json || true

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: audit.json
        
      # Ensure code quality for clinical safety
      - name: Run Linters
        run: npm run lint --if-present

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pocketgull_api/requirements.txt

      - name: Run Python Dependency Audit
        run: |
          pip install pip-audit
          pip-audit -r pocketgull_api/requirements.txt --local 
      # Run unit tests (safety red-team + service logic)
      - name: Run Unit Tests
        run: npm test

  test-e2e:
    needs: security-and-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Application
        run: npm run build

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E Tests
        run: npm run test:e2e
        env:
          CI: true
          GEMINI_API_KEY: ''
          SKIP_HEALTHCARE_PROVISION: 'true'

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # Deploy a tagged Cloud Run revision for PR preview/staging
  preview-deploy:
    needs: [security-and-lint, test-e2e]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: 'read'
      id-token: 'write'
      pull-requests: 'write'

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@ba79af03959ebeac9769e648f473a284504d9193 # v2.1.10
        with:
          workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Build Preview Image
        run: |
          gcloud auth configure-docker gcr.io
          IMAGE_PATH=gcr.io/${{ secrets.GCP_PROJECT_ID }}/pocket-gull
          docker build -t $IMAGE_PATH:pr-${{ github.event.number }} .

      - name: Push Preview Image
        run: |
          IMAGE_PATH=gcr.io/${{ secrets.GCP_PROJECT_ID }}/pocket-gull
          docker push $IMAGE_PATH:pr-${{ github.event.number }}

      - name: Deploy Preview to Cloud Run
        id: deploy-preview
        uses: google-github-actions/deploy-cloudrun@2028e2d7d30a78c6910e0632e48dd561b064884d # v2.3.0.14.3.0.1
        with:
          service: 'pocket-gull-v2'
          region: 'us-central1'
          image: 'gcr.io/${{ secrets.GCP_PROJECT_ID }}/pocket-gull:pr-${{ github.event.number }}'
          tag: 'pr-${{ github.event.number }}'
          no_traffic: true  # Don't shift production traffic
          env_vars: |
            NODE_ENV=production
            OTEL_SDK_DISABLED=true
            GOOGLE_CLOUD_PROJECT=${{ secrets.GCP_PROJECT_ID }}
            GOOGLE_CLOUD_REGION=us-central1
          flags: '--set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest --concurrency=100 --max-instances=1 --min-instances=0'

      - name: Comment Preview URL on PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const url = '${{ steps.deploy-preview.outputs.url }}';
            const body = `🔍 **Preview deployed!**\n\n🌐 ${url}\n\n_This preview will be cleaned up when the PR is closed._`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes('Preview deployed!'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  build-and-deploy:
    needs: [security-and-lint, test-e2e]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: production # Enables manual approval gates in GitHub
    
    # Required permissions for Workload Identity Federation
    permissions:
      contents: 'read'
      id-token: 'write'
      security-events: 'write' # For Trivy SARIF upload
    
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@ba79af03959ebeac9769e648f473a284504d9193 # v2.1.10
        with:
          # Keyless Workload Identity Federation
          workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'
          
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1
          
      - name: Build Docker Image
        run: |
          gcloud auth configure-docker gcr.io
          IMAGE_PATH=gcr.io/${{ secrets.GCP_PROJECT_ID }}/pocket-gull
          
          # Docker caching for faster builds
          docker pull $IMAGE_PATH:latest || true
          docker build \
            --cache-from $IMAGE_PATH:latest \
            -t $IMAGE_PATH:${{ github.sha }} \
            -t $IMAGE_PATH:latest .

      - name: Trivy Container Scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: 'gcr.io/${{ secrets.GCP_PROJECT_ID }}/pocket-gull:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'
          # Don't fail the build on existing vulns, but upload results
          exit-code: '0'

      - name: Upload Trivy Scan Results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-container'

      - name: Push Docker Image
        run: |
          IMAGE_PATH=gcr.io/${{ secrets.GCP_PROJECT_ID }}/pocket-gull
          docker push $IMAGE_PATH:${{ github.sha }}
          docker push $IMAGE_PATH:latest
          
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@2028e2d7d30a78c6910e0632e48dd561b064884d # v2.3.0.14.3.0.1
        with:
          service: 'pocket-gull-v2'
          region: 'us-central1'
          image: 'gcr.io/${{ secrets.GCP_PROJECT_ID }}/pocket-gull:${{ github.sha }}'
          env_vars: |
            NODE_ENV=production
            OTEL_SDK_DISABLED=true
            GOOGLE_CLOUD_PROJECT=${{ secrets.GCP_PROJECT_ID }}
            GOOGLE_CLOUD_REGION=us-central1
          # Secure deployment flags + secrets binding
          flags: '--vpc-egress=private-ranges-only --concurrency=100 --max-instances=2 --min-instances=0 --set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest,STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest,STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest,AWS_ACCESS_KEY_ID=AWS_ACCESS_KEY_ID:latest,AWS_SECRET_ACCESS_KEY=AWS_SECRET_ACCESS_KEY:latest,AWS_HEALTHLAKE_ENDPOINT=AWS_HEALTHLAKE_ENDPOINT:latest'

name: "Dependency Review"

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Dependency Review
        uses: actions/dependency-review-action@da24556b548a50705dd671f47852072ea4c105d9 # v4.7.1
        with:
          # Block PRs that introduce high or critical severity vulnerabilities
          fail-on-severity: high
          # Only allow permissive open-source licenses
          allow-licenses: MIT, Apache-2.0, BSD-3-Clause, BSD-2-Clause, ISC, Unlicense, CC0-1.0
          # Comment on the PR with a summary of findings
          comment-summary-in-pr: always
          # Enable Scorecard checks to show metadata details
          show-openssf-scorecard: true
          # Lower warning threshold to 1.5 to clean up warnings on standard packages
          warn-on-openssf-scorecard-level: 1.5
          allow-dependencies-licenses: |
            pkg:npm/dompurify
            pkg:npm/http-proxy-middleware
            pkg:npm/ws
            pkg:github/github/codeql-action
            pkg:github/ossf/scorecard-action

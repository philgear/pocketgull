# .github/dependency-review-config.yml

# Only allow standard permissive licenses
allow-licenses:
  - MIT
  - Apache-2.0
  - BSD-3-Clause
  - BSD-2-Clause
  - ISC
  - Unlicense
  - CC0-1.0

# Exclude specific dependencies from license checks (using purl format)
allow-dependencies-licenses:
  - pkg:npm/dompurify
  - pkg:npm/http-proxy-middleware
  - pkg:npm/ws
  - pkg:github/github/codeql-action
  - pkg:github/ossf/scorecard-action
  - pkg:npm/@axe-core/puppeteer
  - pkg:npm/axe-core
  - pkg:npm/@img/sharp-libvips-linux-x64
  - pkg:npm/pako
  - pkg:npm/argparse
  - pkg:npm/caniuse-lite
  - pkg:npm/chownr
  - pkg:npm/common-ancestor-path
  - pkg:npm/glob
  - pkg:npm/jackspeak
  - pkg:npm/jsonify
  - pkg:npm/minipass
  - pkg:npm/minipass-flush
  - pkg:npm/package-json-from-dist
  - pkg:npm/path-scurry
  - pkg:npm/sax
  - pkg:npm/spdx-exceptions
  - pkg:npm/tar
  - pkg:npm/tslib
  - pkg:npm/uri-templates
  - pkg:npm/url-template
  - pkg:npm/@google-cloud/agones-sdk

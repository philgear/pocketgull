services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4000:8080" # Maps local port 4000 to SSR port 8080
    environment:
      - NODE_ENV=production
      - API_URL=http://api:8000
      - OTEL_SDK_DISABLED=true
    env_file:
      - .env.local
    depends_on:
      - api
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  api:
    build:
      context: ./pocketgull_api
      dockerfile: Dockerfile.python
    ports:
      - "8000:8080"
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - pocketgull_api/.env.local
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  hue-relay:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["node", "scripts/hue-relay.js"]
    ports:
      - "8081:8080" # The Hue relay defaults to 8080, mapped to 8081
    environment:
      - NODE_ENV=production
      - OTEL_SDK_DISABLED=true
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-deployment
  labels:
    app: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: pocketgull-web
          ports:
            - containerPort: 8080
          env:
            - name: PYTHON_API_URL
              valueFrom:
                configMapKeyRef:
                  name: pocketgull-config
                  key: PYTHON_API_URL
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: pocketgull-config
                  key: NODE_ENV
          envFrom:
            - secretRef:
                name: pocketgull-secrets
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
            requests:
              cpu: "100m"
              memory: 256Mi
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp
      volumes:
        - name: tmp-volume
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: web-service
spec:
  selector:
    app: web
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP
